<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Dungeoned Out</title>

<style>

body { margin:0; background:black; overflow:hidden; }

canvas { display:block; }

</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

// ==== GAME STATE ====

let gameState = "menu";

// ==== CANVAS ====

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");

canvas.width = innerWidth;

canvas.height = innerHeight;

// ==== SOUND ====

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(f,d){let o=audioCtx.createOscillator(),g=audioCtx.createGain();

o.connect(g);g.connect(audioCtx.destination);

o.frequency.value=f;o.start();

g.gain.setValueAtTime(0.2,audioCtx.currentTime);

g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);

o.stop(audioCtx.currentTime+d);}

// ==== VARIABLES ====

let shake=0, room=1, enemies=[], fireballs=[], loot=[], inventory=[];

let xp=0, lvl=1, xpNext=5, choosing=false, options=[];

let cooldown=0;

// ==== PLAYER ====

let player;

// ==== UPGRADES ====

let up;

// ==== SPELLS ====

let spells;

let spellCD;

// ==== SAVE ====

function saveGame(){

 localStorage.setItem("save", JSON.stringify({player,up,spells,lvl,xp,xpNext,room,inventory}));

}

function loadGame(){

 let d = JSON.parse(localStorage.getItem("save"));

 if(!d) return false;

 player=d.player; up=d.up; spells=d.spells;

 lvl=d.lvl; xp=d.xp; xpNext=d.xpNext; room=d.room;

 inventory=d.inventory||[];

 return true;

}

// ==== RESET ====

function resetGame(){

 room=1; xp=0; lvl=1; xpNext=5;

 enemies=[]; fireballs=[]; loot=[]; inventory=[];

 player={x:innerWidth/2,y:innerHeight/2,hp:100,maxHp:100,speed:3,targetX:null,targetY:null};

 up={dmg:25,cd:30,speed:3,maxHp:100};

 spells={ice:false,light:false};

 spellCD={ice:0,light:0};

 start();

}

// ==== ENEMIES ====

function enemy(){

 let r=Math.random();

 if(r<0.5) return {t:"b",x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:20,spd:1.5,h:40+Math.pow(room,1.2)*4};

 if(r<0.8) return {t:"f",x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:16,spd:3,h:20+room*3};

 return {t:"t",x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:26,spd:.8,h:80+room*10};

}

function boss(){

 return {t:"boss",x:innerWidth/2,y:120,s:50,spd:1.2,h:250+Math.pow(room,1.3)*10};

}

function start(){

 enemies=[];

 if(room%5===0) enemies.push(boss());

 else for(let i=0;i<room+2;i++) enemies.push(enemy());

}

// ==== LEVEL UP ====

function levelUp(){

 lvl++; xp=0; xpNext+=4+Math.floor(lvl*.5); choosing=true;

 options=[

  {t:"🔥 DMG",a:()=>up.dmg+=10},

  {t:"❄️ CD",a:()=>up.cd=Math.max(10,up.cd-5)},

  {t:"❤️ HP",a:()=>{up.maxHp+=20;player.hp+=20}},

  {t:"💨 SPD",a:()=>up.speed+=.5},

  {t:"⚡ Lightning",a:()=>spells.light=true},

  {t:"🧊 Ice",a:()=>spells.ice=true}

 ].sort(()=>.5-Math.random()).slice(0,3);

}

// ==== INPUT ====

canvas.addEventListener("touchstart",e=>{

 let t=e.touches[0];

 // MENU

 if(gameState==="menu"){

  if(t.clientY>innerHeight/2 && t.clientY<innerHeight/2+50){

   localStorage.removeItem("save");

   resetGame();

   gameState="playing";

  }

  if(t.clientY>innerHeight/2+60 && t.clientY<innerHeight/2+110){

   if(loadGame()){ start(); gameState="playing"; }

  }

  return;

 }

 // UPGRADES

 if(choosing){

  options.forEach((o,i)=>{

   let y=innerHeight/2+i*50;

   if(t.clientY>y&&t.clientY<y+40){o.a();choosing=false;saveGame();}

  });

  return;

 }

 let hit=enemies.find(en=>Math.hypot(t.clientX-en.x,t.clientY-en.y)<en.s);

 if(hit){

  hit.h-=40+(lvl*2); beep(600,.1); shake=10;

 }else{

  if(cooldown<=0){

   let dx=t.clientX-player.x,dy=t.clientY-player.y,d=Math.hypot(dx,dy);

   fireballs.push({x:player.x,y:player.y,vx:dx/d*6,vy:dy/d*6});

   cooldown=up.cd; beep(300,.1);

  }

  player.targetX=t.clientX; player.targetY=t.clientY;

 }

 if(e.touches.length===2 && spells.ice && spellCD.ice<=0){

  enemies.forEach(en=>{

   if(Math.hypot(player.x-en.x,player.y-en.y)<120){

    en.h-=20; en.slow=.5;

   }

  });

  spellCD.ice=120; beep(500,.2);

 }

});

// ==== UPDATE ====

function update(){

 if(gameState!=="playing"||choosing) return;

 player.speed=up.speed;

 if(player.targetX){

  let dx=player.targetX-player.x,dy=player.targetY-player.y,d=Math.hypot(dx,dy);

  if(d>5){player.x+=dx/d*player.speed;player.y+=dy/d*player.speed;}

 }

 enemies.forEach(en=>{

  let dx=player.x-en.x,dy=player.y-en.y,d=Math.hypot(dx,dy);

  let slow=en.slow||1;

  en.x+=dx/d*en.spd*slow;

  en.y+=dy/d*en.spd*slow;

  if(en.slow) en.slow+=(1-en.slow)*.05;

  if(d<en.s+10){

   player.hp -= en.t==="boss"?0.6:0.15;

   shake=6;

  }

 });

 fireballs.forEach(f=>{

  f.x+=f.vx; f.y+=f.vy;

  enemies.forEach(en=>{

   if(Math.hypot(f.x-en.x,f.y-en.y)<en.s){

    en.h-=up.dmg*.8; f.hit=true; beep(800,.05); shake=8;

   }

  });

 });

 fireballs=fireballs.filter(f=>!f.hit);

 if(spells.light && spellCD.light<=0){

  let n=enemies[0];

  if(n){n.h-=40; spellCD.light=100; beep(1000,.05);}

 }

 enemies=enemies.filter(en=>{

  if(en.h<=0){

   xp++; beep(200,.1);

   if(Math.random()<.4) loot.push({x:en.x,y:en.y,t:["dmg","hp","spd"][Math.floor(Math.random()*3)]});

   if(xp>=xpNext) levelUp();

   return false;

  }

  return true;

 });

 loot.forEach(l=>{

  if(Math.hypot(player.x-l.x,player.y-l.y)<20){

   if(l.t==="dmg") up.dmg+=3;

   if(l.t==="hp"){up.maxHp+=6;player.hp+=6;}

   if(l.t==="spd") up.speed+=.1;

   inventory.push(l); l.gone=true;

  }

 });

 loot=loot.filter(l=>!l.gone);

 if(enemies.length===0){room++;start();saveGame();}

 if(cooldown>0) cooldown--;

 for(let k in spellCD) if(spellCD[k]>0) spellCD[k]--;

 if(shake>0) shake--;

}

// ==== DRAW ====

function draw(){

 if(gameState==="menu"){

  ctx.fillStyle="black";

  ctx.fillRect(0,0,innerWidth,innerHeight);

  ctx.fillStyle="white";

  ctx.font="30px Arial";

  ctx.fillText("DUNGEONED OUT",innerWidth/2-130,innerHeight/2-100);

  ctx.font="20px Arial";

  ctx.fillText("▶️ Start New Run",innerWidth/2-100,innerHeight/2);

  ctx.fillText("🔁 Continue",innerWidth/2-100,innerHeight/2+60);

  return;

 }

 let ox=(Math.random()-.5)*shake, oy=(Math.random()-.5)*shake;

 ctx.save(); ctx.translate(ox,oy);

 ctx.fillStyle="#111"; ctx.fillRect(0,0,innerWidth,innerHeight);

 ctx.fillStyle="purple";

 ctx.fillRect(player.x-10,player.y-10,20,20);

 enemies.forEach(en=>{

  ctx.fillStyle=en.t==="f"?"yellow":en.t==="t"?"blue":en.t==="boss"?"white":"red";

  ctx.fillRect(en.x-en.s/2,en.y-en.s/2,en.s,en.s);

 });

 ctx.fillStyle="orange";

 fireballs.forEach(f=>{ctx.beginPath();ctx.arc(f.x,f.y,6,0,6.28);ctx.fill();});

 ctx.fillStyle="lime";

 loot.forEach(l=>ctx.fillRect(l.x-4,l.y-4,8,8));

 ctx.restore();

 ctx.fillStyle="white";

 ctx.fillText("HP:"+Math.floor(player.hp),20,30);

 ctx.fillText("Room:"+room,20,60);

 ctx.fillText("Lvl:"+lvl,20,90);

 ctx.fillStyle="red";

 ctx.fillRect(20,110,100,10);

 ctx.fillStyle="green";

 ctx.fillRect(20,110,(player.hp/player.maxHp)*100,10);

 if(choosing){

  ctx.fillStyle="black"; ctx.fillRect(0,0,innerWidth,innerHeight);

  ctx.fillStyle="white";

  options.forEach((o,i)=>ctx.fillText(o.t,innerWidth/2-100,innerHeight/2+i*50));

 }

 if(player.hp<=0){

  ctx.fillText("GAME OVER - TAP",innerWidth/2-100,innerHeight/2);

 }

}

// ==== LOOP ====

function loop(){update();draw();requestAnimationFrame(loop);}

loop();

</script>

</body>

</html>
