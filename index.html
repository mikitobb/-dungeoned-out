<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body { margin:0; overflow:hidden; background:#000; }

canvas { display:block; }

</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");

canvas.width = innerWidth;

canvas.height = innerHeight;

// ===== CORE =====

let animTime = 0;

let shake = 0;

// ===== PLAYER =====

let player = {

 x: innerWidth/2,

 y: innerHeight/2,

 targetX: innerWidth/2,

 targetY: innerHeight/2,

 speed: 3,

 hp: 100,

 maxHp: 100,

 level: 1,

 xp: 0,

 xpNext: 20

};

// ===== SYSTEMS =====

let enemies = [];

let effects = [];

let abilities = [];

let loot = [];

let playerEffects = [];

// ===== COMBAT =====

let attackCooldown = 0;

let attackSpeed = 25;

let damage = 6;

// ===== ABILITY =====

let abilityCooldown = 0;

let abilityMax = 80;

// ===== ULTIMATE =====

let ultimateCharge = 0;

let ultimateReady = false;

// ===== WAVES =====

let wave = 1;

let inWave = true;

// ===== UTILS =====

function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function triggerShake(i){ shake=i; }

// ===== ENEMY TYPES =====

function enemy(){

 let types=["normal","tank","fast","ranged"];

 let type=types[Math.floor(Math.random()*types.length)];

 let e={

  x:Math.random()*innerWidth,

  y:Math.random()*innerHeight,

  type,

  h:20+wave*5,

  spd:1.5

 };

 if(type==="tank"){ e.h=60; e.spd=0.7; }

 if(type==="fast"){ e.h=15; e.spd=2.5; }

 if(type==="ranged"){ e.cooldown=60; }

 return e;

}

function spawnEnemies(){

 enemies=[];

 for(let i=0;i<4+wave;i++) enemies.push(enemy());

}

// ===== LOOT =====

function generateLoot(){

 let r=Math.random();

 let rarity="common";

 if(r>0.9) rarity="legendary";

 else if(r>0.7) rarity="epic";

 else if(r>0.4) rarity="rare";

 return {

  x:0,y:0,rarity,

  dmg:Math.random()*3,

  effect: rarity==="legendary"

   ? ["explode","lifesteal","chain"][Math.floor(Math.random()*3)]

   : null

 };

}

// ===== INPUT =====

canvas.addEventListener("touchstart", e=>{

 let t=e.touches[0];

 if(e.touches.length>2 && ultimateReady){

  enemies.forEach(en=> en.h-=50);

  ultimateCharge=0;

  ultimateReady=false;

  return;

 }

 if(e.touches.length>1 && abilityCooldown<=0){

  abilities.push({x:player.x,y:player.y,r:10,life:20});

  abilityCooldown=abilityMax;

 } else {

  player.targetX=t.clientX;

  player.targetY=t.clientY;

 }

});

// ===== UPDATE =====

function update(){

 animTime+=0.05;

 player.x+=(player.targetX-player.x)*0.1;

 player.y+=(player.targetY-player.y)*0.1;

 // ENEMIES

 enemies.forEach(en=>{

  let dx=player.x-en.x;

  let dy=player.y-en.y;

  let d=Math.hypot(dx,dy);

  en.x+=dx/d*en.spd;

  en.y+=dy/d*en.spd;

  if(d<20){ player.hp-=0.2; triggerShake(2); }

  if(en.type==="ranged"){

   en.cooldown--;

   if(d<200 && en.cooldown<=0){

    player.hp-=5;

    en.cooldown=60;

   }

  }

 });

 // AUTO ATTACK

 attackCooldown--;

 if(attackCooldown<=0){

  let nearest=enemies[0];

  enemies.forEach(en=>{

   if(dist(player,en)<dist(player,nearest)) nearest=en;

  });

  if(nearest && dist(player,nearest)<60){

   nearest.h-=damage;

   ultimateCharge+=1;

   if(playerEffects.includes("explode")){

    enemies.forEach(e=>{

     if(dist(e,nearest)<50) e.h-=5;

    });

   }

   if(playerEffects.includes("lifesteal")){

    player.hp+=0.5;

   }

   attackCooldown=attackSpeed;

  }

 }

 // ABILITY

 abilityCooldown--;

 abilities.forEach(a=>{

  a.r+=4; a.life--;

  enemies.forEach(en=>{

   if(dist(a,en)<a.r){

    en.h-=15;

    if(playerEffects.includes("chain")){

     enemies.forEach(o=>{

      if(o!==en && dist(o,en)<60) o.h-=5;

     });

    }

   }

  });

 });

 abilities=abilities.filter(a=>a.life>0);

 // LOOT DROP

 enemies=enemies.filter(en=>{

  if(en.h<=0){

   player.xp+=5;

   if(Math.random()<0.6){

    let item=generateLoot();

    item.x=en.x; item.y=en.y;

    loot.push(item);

   }

   return false;

  }

  return true;

 });

 // PICKUP

 loot.forEach(l=>{

  if(dist(player,l)<20){

   damage+=l.dmg;

   if(l.effect) playerEffects.push(l.effect);

   l.picked=true;

  }

 });

 loot=loot.filter(l=>!l.picked);

 // LEVEL

 if(player.xp>=player.xpNext){

  player.xp=0;

  player.level++;

  player.xpNext+=20;

  player.maxHp+=10;

 }

 // WAVE

 if(enemies.length===0){

  wave++;

  spawnEnemies();

 }

 if(ultimateCharge>=100) ultimateReady=true;

}

// ===== DRAW =====

function draw(){

 ctx.save();

 if(shake>0){

  ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  shake*=0.9;

 }

 ctx.fillStyle="#0e0e11";

 ctx.fillRect(0,0,innerWidth,innerHeight);

 // PLAYER

 let bob=Math.sin(animTime*4)*2;

 ctx.fillStyle="rgba(0,0,0,0.3)";

 ctx.beginPath();

 ctx.ellipse(player.x,player.y+14,12,5,0,0,Math.PI*2);

 ctx.fill();

 ctx.fillStyle="#7c4dff";

 ctx.fillRect(player.x-6,player.y-6+bob,12,12);

 ctx.fillStyle="#f1c27d";

 ctx.beginPath();

 ctx.arc(player.x,player.y-12+bob,6,0,Math.PI*2);

 ctx.fill();

 // ENEMIES

 enemies.forEach(en=>{

  let c="#ff5252";

  if(en.type==="tank") c="#8d6e63";

  if(en.type==="fast") c="#00e5ff";

  if(en.type==="ranged") c="#ffd740";

  ctx.fillStyle=c;

  ctx.beginPath();

  ctx.arc(en.x,en.y,8,0,Math.PI*2);

  ctx.fill();

 });

 // ABILITY

 abilities.forEach(a=>{

  ctx.globalAlpha=a.life/20;

  let g=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.r);

  g.addColorStop(0,"#7c4dff");

  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;

  ctx.beginPath();

  ctx.arc(a.x,a.y,a.r,0,Math.PI*2);

  ctx.fill();

 });

 ctx.globalAlpha=1;

 // LOOT

 loot.forEach(l=>{

  ctx.fillStyle=l.rarity==="legendary"?"#ffd700":"#aaa";

  ctx.fillRect(l.x-3,l.y-3,6,6);

 });

 // UI

 ctx.fillStyle="#fff";

 ctx.fillText("HP: "+Math.floor(player.hp),20,30);

 ctx.fillText("LVL: "+player.level,20,50);

 ctx.fillText("Wave: "+wave,20,70);

 ctx.fillRect(innerWidth-120,20,100,10);

 ctx.fillStyle="#ff5252";

 ctx.fillRect(innerWidth-120,20,ultimateCharge,10);

 ctx.restore();

}

// ===== LOOP =====

function loop(){

 update();

 draw();

 requestAnimationFrame(loop);

}

spawnEnemies();

loop();

</script>

</body>

</html>
