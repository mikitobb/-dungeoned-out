<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body { margin:0; overflow:hidden; background:#000; }

canvas { display:block; }

</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");

canvas.width = innerWidth;

canvas.height = innerHeight;

// === PLAYER ===

let player = {

 x: innerWidth/2,

 y: innerHeight/2,

 targetX: innerWidth/2,

 targetY: innerHeight/2,

 speed: 3,

 hp: 100,

 maxHp: 100

};

// === SYSTEMS ===

let enemies = [];

let hitEffects = [];

let animTime = 0;

// === COMBAT ===

let attackRange = 60;

let attackCooldown = 0;

let attackSpeed = 30;

let playerDamage = 5;

// === SCREEN SHAKE ===

let shake = 0;

function triggerShake(i){ shake = i; }

// === UTILS ===

function dist(a,b){

 return Math.hypot(a.x-b.x, a.y-b.y);

}

// === ENEMY ===

function enemy(){

 return {

  x: Math.random()*innerWidth,

  y: Math.random()*innerHeight,

  h: 30,

  spd: 1.5

 };

}

function spawnEnemies(){

 enemies = [];

 for(let i=0;i<6;i++) enemies.push(enemy());

}

spawnEnemies();

// === INPUT ===

canvas.addEventListener("touchstart", e=>{

 let t = e.touches[0];

 player.targetX = t.clientX;

 player.targetY = t.clientY;

});

// === LIGHT ===

function drawLight(x,y,r,color){

 let g = ctx.createRadialGradient(x,y,0,x,y,r);

 g.addColorStop(0,color);

 g.addColorStop(1,"transparent");

 ctx.fillStyle=g;

 ctx.beginPath();

 ctx.arc(x,y,r,0,Math.PI*2);

 ctx.fill();

}

// === UPDATE ===

function update(){

 animTime += 0.05;

 // MOVEMENT (smooth)

 player.x += (player.targetX - player.x) * 0.1;

 player.y += (player.targetY - player.y) * 0.1;

 // ENEMY FOLLOW

 enemies.forEach(en=>{

  let dx = player.x - en.x;

  let dy = player.y - en.y;

  let d = Math.hypot(dx,dy);

  en.x += dx/d * en.spd;

  en.y += dy/d * en.spd;

  if(d < 20){

   player.hp -= 0.1;

   triggerShake(2);

  }

 });

 // AUTO ATTACK

 attackCooldown--;

 if(attackCooldown <= 0){

  let nearest = null;

  enemies.forEach(en=>{

   if(!nearest || dist(player,en) < dist(player,nearest)){

    nearest = en;

   }

  });

  if(nearest && dist(player,nearest) < attackRange){

   nearest.h -= playerDamage;

   hitEffects.push({

    x: nearest.x,

    y: nearest.y,

    life: 10

   });

   attackCooldown = attackSpeed;

   triggerShake(3);

  }

 }

 // REMOVE DEAD

 enemies = enemies.filter(en=> en.h > 0);

 // RESPAWN

 if(enemies.length === 0){

  spawnEnemies();

 }

 // HIT EFFECT UPDATE

 hitEffects.forEach(e=>{

  e.y -= 0.5;

  e.life--;

 });

 hitEffects = hitEffects.filter(e=>e.life>0);

}

// === DRAW ===

function draw(){

 ctx.save();

 // SHAKE

 if(shake > 0){

  ctx.translate(

   (Math.random()-0.5)*shake,

   (Math.random()-0.5)*shake

  );

  shake *= 0.9;

 }

 // BACKGROUND

 ctx.fillStyle="#0e0e11";

 ctx.fillRect(0,0,innerWidth,innerHeight);

 // LIGHT

 drawLight(player.x,player.y,80,"rgba(255,255,255,0.15)");

 // PLAYER

 let bob = Math.sin(animTime*4)*2;

 ctx.fillStyle="#7c4dff";

 ctx.beginPath();

 ctx.arc(player.x, player.y + bob, 10, 0, Math.PI*2);

 ctx.fill();

 // ENEMIES

 enemies.forEach(en=>{

  ctx.fillStyle="#ff5252";

  ctx.beginPath();

  ctx.arc(en.x,en.y,8,0,Math.PI*2);

  ctx.fill();

 });

 // HIT FX

 hitEffects.forEach(e=>{

  ctx.globalAlpha = e.life/10;

  ctx.fillStyle="#ffd700";

  ctx.beginPath();

  ctx.arc(e.x,e.y,10,0,Math.PI*2);

  ctx.fill();

 });

 ctx.globalAlpha = 1;

 // TARGET INDICATOR

 ctx.fillStyle="rgba(255,255,255,0.2)";

 ctx.beginPath();

 ctx.arc(player.targetX, player.targetY, 8, 0, Math.PI*2);

 ctx.fill();

 // UI

 ctx.fillStyle="#fff";

 ctx.fillText("HP: " + Math.floor(player.hp), 20, 30);

 ctx.restore();

}

// === LOOP ===

function loop(){

 update();

 draw();

 requestAnimationFrame(loop);

}

loop();

</script>

</body>

</html>
