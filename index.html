<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body { margin:0; overflow:hidden; background:#000; }

canvas { display:block; }

</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");

canvas.width = innerWidth;

canvas.height = innerHeight;

// === CORE STATE ===

let animTime = 0;

let shake = 0;

// === PLAYER ===

let player = {

 x: innerWidth/2,

 y: innerHeight/2,

 targetX: innerWidth/2,

 targetY: innerHeight/2,

 speed: 3,

 hp: 100,

 maxHp: 100,

 level: 1,

 xp: 0,

 xpNext: 20

};

// === SYSTEMS ===

let enemies = [];

let effects = [];

let abilities = [];

// === COMBAT ===

let attackCooldown = 0;

let attackSpeed = 25;

let damage = 6;

// === ABILITY ===

let abilityCooldown = 0;

let abilityMax = 80;

// === UTILS ===

function dist(a,b){

 return Math.hypot(a.x-b.x, a.y-b.y);

}

function triggerShake(i){ shake = i; }

// === ENEMY ===

function enemy(){

 return {

  x: Math.random()*innerWidth,

  y: Math.random()*innerHeight,

  h: 20 + player.level * 5,

  spd: 1.2 + player.level*0.05

 };

}

function spawnEnemies(){

 for(let i=0;i<4 + player.level;i++){

  enemies.push(enemy());

 }

}

// === INPUT ===

canvas.addEventListener("touchstart", e=>{

 let t = e.touches[0];

 if(e.touches.length > 1 && abilityCooldown <= 0){

  abilities.push({

   x: player.x,

   y: player.y,

   r: 10,

   life: 20

  });

  abilityCooldown = abilityMax;

 } else {

  player.targetX = t.clientX;

  player.targetY = t.clientY;

 }

});

// === LIGHT ===

function light(x,y,r,c){

 let g = ctx.createRadialGradient(x,y,0,x,y,r);

 g.addColorStop(0,c);

 g.addColorStop(1,"transparent");

 ctx.fillStyle=g;

 ctx.beginPath();

 ctx.arc(x,y,r,0,Math.PI*2);

 ctx.fill();

}

// === UPDATE ===

function update(){

 animTime += 0.05;

 // MOVE

 player.x += (player.targetX - player.x)*0.1;

 player.y += (player.targetY - player.y)*0.1;

 // ENEMY AI

 enemies.forEach(en=>{

  let dx = player.x - en.x;

  let dy = player.y - en.y;

  let d = Math.hypot(dx,dy);

  en.x += dx/d * en.spd;

  en.y += dy/d * en.spd;

  if(d < 20){

   player.hp -= 0.2;

   triggerShake(2);

  }

 });

 // AUTO ATTACK

 attackCooldown--;

 if(attackCooldown <= 0){

  let nearest = enemies[0];

  enemies.forEach(en=>{

   if(dist(player,en) < dist(player,nearest)){

    nearest = en;

   }

  });

  if(nearest && dist(player,nearest) < 60){

   nearest.h -= damage;

   effects.push({x:nearest.x,y:nearest.y,life:10});

   attackCooldown = attackSpeed;

   triggerShake(3);

  }

 }

 // ABILITY

 abilityCooldown--;

 abilities.forEach(a=>{

  a.r += 4;

  a.life--;

  enemies.forEach(en=>{

   if(dist(a,en) < a.r){

    en.h -= 15;

   }

  });

 });

 abilities = abilities.filter(a=>a.life>0);

 // REMOVE DEAD

 enemies = enemies.filter(en=>{

  if(en.h <= 0){

   player.xp += 5;

   return false;

  }

  return true;

 });

 // LEVEL UP

 if(player.xp >= player.xpNext){

  player.xp = 0;

  player.level++;

  player.xpNext += 20;

  player.maxHp += 10;

  damage += 2;

 }

 // RESPAWN

 if(enemies.length === 0){

  spawnEnemies();

 }

 // EFFECTS

 effects.forEach(e=>{

  e.life--;

  e.y -= 0.5;

 });

 effects = effects.filter(e=>e.life>0);

}

// === DRAW ===

function draw(){

 ctx.save();

 if(shake>0){

  ctx.translate(

   (Math.random()-0.5)*shake,

   (Math.random()-0.5)*shake

  );

  shake *= 0.9;

 }

 // BG

 ctx.fillStyle="#0e0e11";

 ctx.fillRect(0,0,innerWidth,innerHeight);

 light(player.x,player.y,80,"rgba(255,255,255,0.15)");

 let bob = Math.sin(animTime*4)*2;

 // PLAYER

 ctx.fillStyle="#7c4dff";

 ctx.beginPath();

 ctx.arc(player.x, player.y+bob, 10, 0, Math.PI*2);

 ctx.fill();

 // ENEMIES

 enemies.forEach(en=>{

  ctx.fillStyle="#ff5252";

  ctx.beginPath();

  ctx.arc(en.x,en.y,8,0,Math.PI*2);

  ctx.fill();

 });

 // ABILITY

 abilities.forEach(a=>{

  ctx.globalAlpha = a.life/20;

  let g = ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.r);

  g.addColorStop(0,"#7c4dff");

  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;

  ctx.beginPath();

  ctx.arc(a.x,a.y,a.r,0,Math.PI*2);

  ctx.fill();

 });

 ctx.globalAlpha = 1;

 // HIT FX

 effects.forEach(e=>{

  ctx.globalAlpha = e.life/10;

  ctx.fillStyle="#ffd700";

  ctx.beginPath();

  ctx.arc(e.x,e.y,10,0,Math.PI*2);

  ctx.fill();

 });

 ctx.globalAlpha = 1;

 // UI

 ctx.fillStyle="#fff";

 ctx.fillText("HP: "+Math.floor(player.hp),20,30);

 ctx.fillText("LVL: "+player.level,20,50);

 // XP BAR

 ctx.fillStyle="#333";

 ctx.fillRect(20,60,100,6);

 ctx.fillStyle="#7c4dff";

 ctx.fillRect(20,60,100*(player.xp/player.xpNext),6);

 ctx.restore();

}

// === LOOP ===

function loop(){

 update();

 draw();

 requestAnimationFrame(loop);

}

spawnEnemies();

loop();

</script>

</body>

</html>
